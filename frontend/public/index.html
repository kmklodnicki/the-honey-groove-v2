                <animate attributeName="y" from="180" to="40" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1"/>

            <path d="M28 55 C28 55 22 58 20 70 C19 76 22 78 25 75 C27 73 28 65 28 55 Z" fill="#E8A820" opacity="0.6"/>
          </svg>
          <p id="loading-phrase" style="margin-top:24px;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;color:#8A6B4A;font-size:16px;transition:opacity 0.3s ease">filling the hive...</p>
        </div>
        <script>
          (function(){
            var phrases=['filling the hive...','warming up the wax...','finding your records...','the needle is dropping...','almost there...'];
            var el=document.getElementById('loading-phrase');
            var i=0;
            if(el){setInterval(function(){el.style.opacity='0';setTimeout(function(){i=(i+1)%phrases.length;el.textContent=phrases[i];el.style.opacity='1'},300)},800)}
            setTimeout(function(){
              var ls=document.getElementById('loading-screen');
              if(ls){ls.style.opacity='0';setTimeout(function(){ls.remove()},400)}
            },6000);
          })();
        </script>
